<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ PKCE EARLY CATCHER: corre antes de React -->
    <script>
      (function () {
        try {
          var u = new URL(window.location.href);
          var hasCode = u.searchParams.has("code");
          var isCallback = u.pathname === "/auth/callback";
          if (hasCode && !isCallback) {
            // conserva TODO el query (code, next, etc.)
            u.pathname = "/auth/callback";
            window.location.replace(u.toString());
          }
        } catch (e) {}
      })();
    </script>

    <title>App Geocercas</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- OJO: este src debe coincidir con tu entry real -->
    <script type="module" src="/src/main.tsx"></script>
    <!-- si tu proyecto usa main.jsx, cambia a:
    <script type="module" src="/src/main.jsx"></script>
    -->
  </body>
</html>
