[functions.stripe-create-portal-session]
verify_jwt = false

[functions.stripe-create-checkout]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false
[functions.paddle-webhook]
# paddle-webhook config
enabled = true
verify_jwt = false
import_map = "./functions/paddle-webhook/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/paddle-webhook/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/paddle-webhook/*.html" ]
